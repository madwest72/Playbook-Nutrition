services:
  backend:
    build: ./backend
    ports:
      - "8090:80"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: playbook
      DB_USER: root
      DB_PASS: root

  frontend:
    build: ./frontend
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: playbook
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3309:3306"

  phpmyadmin:
    image: phpmyadmin
    ports:
      - "8083:80"
    environment:
      PMA_HOST: db

volumes:
  db_data: